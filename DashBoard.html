<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Financial Dashboard | Expense Tracker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="dashboard.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <div class="container">
        <div class="user_menu">
            <i class="fa-solid fa-circle-user" style="color: rgb(177, 151, 252);"></i>
            <div class="menuBar">
                <a href="DashBoard.html"><i class="fa-solid fa-chart-column" style="color: rgb(177, 151, 252);"></i></a>
                <a href="Add_Expense.html"><i class="fa-solid fa-file-invoice" style="color: rgb(177, 151, 252);"></i></a>
                <a href="Analyze_expense.html"><i class="fa-solid fa-layer-group" style="color: rgb(177, 151, 252);"></i></a>
            </div>
        </div>
        <div class="main_contain">
            <div class="intro_part">
                <a href="index.html"><div class="edit_i"><i class="fa-solid fa-pencil"></i> Edit Income</div></a>
                <div class="greet">Hello Harish!</div>
                <div id="user_income"></div>
                <div class="sub_info">Monthly Income</div>
            </div>
            <div class="user_stats">
                <div class="left_stat">
                    <div id="Chart">
                        <div class="pie_chart">
                            <div class="inner_info">
                                <div id="chart_expense"></div>
                                <div id="ex_info">Spent</div>
                            </div>
                        </div>
                        <div class="summary_text">Monthly Summary</div>
                    </div>
                    <div class="chart_desc">
                    </div>
                </div>
                <div class="right_stat">
                    <div id="income_table">
                        <div class="income_title">
                            <div class="title_tra">All Transactions</div>
                            <a href="Add_Expense.html"><div class="transaction_button">Add Transaction</div></a>
                        </div>
                        <div class="table-container">
                            <table>
                            <tr>
                                <th>Category</th>
                                <th>Title</th>
                                <th>Date</th>
                                <th>Amount</th>
                                <th>Delete</th>
                            </tr>
                            
                        </table>
                        </div>
                    </div>
                </div>
            </div>
            <div class="card_stats">
                <div class="ExCard">
                    <div class="card_subinfo">Total Expense</div>
                    <div id="total_amount"></div>
                </div>
                <div class="ExCard">
                    <div class="card_subinfo">Savings</div>
                    <div id="savings_amount"></div>
                </div>
                <div class="ExCard">
                    <div class="card_subinfo">Top Spending Category</div>
                    <div id="spend_cat"></div>
                </div>
                <div class="ExCard">
                    <div class="card_subinfo">Highest Expense</div>
                    <div id="HighEx_amount"></div>
                </div>
            </div>
        </div>
    </div>
    <script src="dashboard.js"></script>
</body>
</html>
