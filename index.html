<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Traker - Homepage</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="homepage.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
</head>
<body>
    <div class="container">
        <div class="user_menu">
            <i class="fa-solid fa-circle-user" style="color: rgb(177, 151, 252);"></i>
            <div class="menuBar">
                <a href="DashBoard.html"><i class="fa-solid fa-chart-column" style="color: rgb(177, 151, 252);"></i></a>
                <a href="Add_Expense.html"><i class="fa-solid fa-file-invoice" style="color: rgb(177, 151, 252);"></i></a>
                <a href="Analyze_expense.html"><i class="fa-solid fa-layer-group" style="color: rgb(177, 151, 252);"></i></a>
            </div>
        </div>
        <div class="main_contain">
            <div class="slogan">Spend Better. Live Better.</div>
            <div id="sub-info">Track income and expenses effortlessly</div>
            <div class="income_form">
                <div class="form_container">
                    <div class="form_title">Set Your Monthly Income</div>
                    <form>
                        <div class="input-wrapper">
                            <span class="prefix">₹</span>
                            <input type="text" name="income" placeholder="e.g.₹23,000"><br><br>
                        </div>
                        <button class="add_Income" type="submit">Add Income</button>
                    </form>
                </div>
                <div class="imp-note">*Note: Please set your income first to track expenses accurately.</div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
    <script src="index.js"></script>
</body>
</html>
